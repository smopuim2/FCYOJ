<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <title>loading</title>
    </head>
    <body>
        <form action='https://phponlinesandbox.com/' method='POST' id='f' hidden>
            <textarea id='t' name='code999'></textarea>
            <input name='action1' value='RUN CODE' hidden>
        </form>
        <script>
            let x=new URLSearchParams(window.location.search);
            let y=new XMLHttpRequest();
            y.open('GET',x.get('q')+'.php');
            y.send();
            y.onreadystatechange=function(){
                if(this.readyState==4 && this.status==200){
                    document.getElementById('t').value='<script>document.documentElement.innerHTML=`\n'+this.responseText+'?>\n`;</'+'script>';
                    document.getElementById('f').submit();
                }
            }
        </script>
    </body>
</html>
